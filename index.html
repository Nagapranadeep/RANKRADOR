<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RankRadar — India College Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
 --primary:#7C6FCD;
 --bg:#F2F1FA;
 --card:#ffffff;
 --text:#2D2B45;
 --muted:#7A7898;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
 font-family:'DM Sans',sans-serif;
 background:var(--bg);
 color:var(--text);
}

/* ================= HEADER ================= */

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:18px 28px;
 background:white;
 box-shadow:0 2px 10px rgba(0,0,0,.05);
 position:sticky;
 top:0;
}

.logo{
 font-family:'Syne',sans-serif;
 font-size:22px;
 font-weight:700;
}

/* ================= HERO ================= */

.hero{
 text-align:center;
 padding:60px 20px;
}

.hero h1{
 font-size:38px;
 margin-bottom:10px;
}

/* ================= CARD ================= */

.card{
 background:var(--card);
 max-width:900px;
 margin:auto;
 padding:30px;
 border-radius:14px;
 box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* ================= FORM ================= */

label{font-size:14px;color:var(--muted)}

input,select{
 width:100%;
 padding:12px;
 margin-top:6px;
 margin-bottom:18px;
 border:1px solid #ddd;
 border-radius:8px;
}

button{
 background:var(--primary);
 color:white;
 border:none;
 padding:14px;
 width:100%;
 border-radius:10px;
 font-size:16px;
 cursor:pointer;
}

/* ================= RESULTS ================= */

.results{
 margin-top:30px;
}

.college{
 padding:16px;
 border:1px solid #eee;
 border-radius:10px;
 margin-bottom:14px;
}

.score{
 font-weight:bold;
 color:var(--primary);
}

</style>
</head>

<body>

<header>
<div class="logo">🎓 RankRadar</div>
</header>

<section class="hero">
<h1>Find Your Perfect College</h1>
<p>AI-powered college recommendation for Indian students</p>
</section>

<div class="card">

<label>Entrance Exam</label>
<select id="exam">
<option value="">Select exam</option>
<option>JEE Main</option>
<option>JEE Advanced</option>
<option>NEET</option>
<option>CAT</option>
</select>

<label>Your Rank / Score</label>
<input id="rank" placeholder="e.g. 12000">

<label>Annual Budget (Lakhs)</label>
<input id="budget" type="number" value="6">

<button onclick="findColleges()">🔍 Find Colleges</button>

<div id="results" class="results"></div>

</div>

<script>

/* ================= COLLEGE DATABASE ================= */
/* simplified version from your uploaded project */

const COLLEGE_DB = [
 {name:"IIT Hyderabad",fees:2.4,rankRange:[1,6000],placements:95},
 {name:"NIT Trichy",fees:1.8,rankRange:[1000,20000],placements:92},
 {name:"VIT Vellore",fees:3.2,rankRange:[5000,50000],placements:88},
 {name:"SRM University",fees:4.0,rankRange:[10000,70000],placements:82},
 {name:"Manipal Institute of Technology",fees:3.8,rankRange:[8000,60000],placements:85}
];

/* ================= SCORING ================= */

function scoreCollege(college, rank, budget){

 let rankScore = Math.min(100, (college.rankRange[1]/rank)*40);

 let budgetScore =
   Math.max(0, ((budget-college.fees)/budget)*100);

 let placementScore = college.placements;

 return Math.round(
   rankScore*0.4 +
   budgetScore*0.3 +
   placementScore*0.3
 );
}

/* ================= MAIN FUNCTION ================= */

function findColleges(){

 const exam=document.getElementById("exam").value;
 const rank=parseFloat(document.getElementById("rank").value);
 const budget=parseFloat(document.getElementById("budget").value);

 if(!exam || !rank){
   alert("Enter exam and rank");
   return;
 }

 const matched = COLLEGE_DB
  .filter(c=>rank<=c.rankRange[1])
  .map(c=>({...c,score:scoreCollege(c,rank,budget)}))
  .sort((a,b)=>b.score-a.score);

 const results=document.getElementById("results");
 results.innerHTML="";

 matched.forEach(c=>{
   results.innerHTML+=`
     <div class="college">
       <h3>${c.name}</h3>
       Fees: ₹${c.fees}L/year<br>
       Placement: ${c.placements}%<br>
       <div class="score">Match Score: ${c.score}%</div>
     </div>
   `;
 });

}

</script>

</body>
</html>
